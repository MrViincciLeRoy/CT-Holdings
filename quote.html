<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get a Quote | CT Holdings & Investments</title>
  <meta name="description" content="Request a free quote from CT Holdings & Investments."/>
  <link rel="canonical" href="https://www.ctholdings.co.za/quote.html"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    :root {
      --navy: #0d1b3e;
      --red: #8b0000;
      --red-bright: #c0392b;
      --gold: #c9a84c;
      --light: #f4f4f0;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: rgba(13,27,62,0.95);
      backdrop-filter: blur(12px);
      padding: 1rem 0;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .navbar-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .navbar-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .navbar-brand img { height: 44px; width: auto; }
    .navbar-brand span { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--white); line-height: 1.2; }
    .navbar-brand span small { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.62rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
    .nav-back { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .nav-back:hover { color: var(--gold); }

    /* ── QUIZ SHELL ── */
    .quiz-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 1.5rem 60px;
      position: relative;
    }

    /* decorative blobs */
    .quiz-shell::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(139,0,0,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .quiz-shell::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── PROGRESS ── */
    .progress-bar-wrap {
      width: 100%;
      max-width: 680px;
      margin-bottom: 2.5rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .step-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
    }
    .step-count { font-size: 0.78rem; color: rgba(255,255,255,0.4); }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--gold));
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── CARD ── */
    .card-stage {
      width: 100%;
      max-width: 680px;
      position: relative;
      perspective: 1200px;
    }

    .quiz-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 3rem 3rem 2.5rem;
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--gold));
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes cardOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-24px) scale(0.97); }
    }
    .card-exiting { animation: cardOut 0.3s ease forwards; }

    .card-icon {
      width: 52px; height: 52px;
      background: rgba(139,0,0,0.15);
      border: 1px solid rgba(139,0,0,0.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .card-question {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 0.6rem;
    }
    .card-hint {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── OPTIONS GRID ── */
    .options-grid {
      display: grid;
      gap: 0.75rem;
    }
    .options-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .options-grid.cols-1 { grid-template-columns: 1fr; }

    .opt-btn {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: rgba(255,255,255,0.85);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .opt-btn .opt-icon { font-size: 1.1rem; opacity: 0.7; flex-shrink: 0; }
    .opt-btn:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--gold);
      color: var(--white);
      transform: translateY(-1px);
    }
    .opt-btn.selected {
      background: rgba(139,0,0,0.2);
      border-color: var(--red);
      color: var(--white);
    }
    .opt-btn.selected .opt-icon { opacity: 1; color: var(--gold); }

    /* ── TEXT INPUT ── */
    .quiz-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .quiz-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); }
    .quiz-input::placeholder { color: rgba(255,255,255,0.3); }
    textarea.quiz-input { resize: none; min-height: 110px; }

    /* ── ACTIONS ── */
    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 1rem;
    }
    .btn-back {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-back:hover { color: rgba(255,255,255,0.8); }
    .btn-next {
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 13px 28px;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-next:hover:not(:disabled) { background: var(--red-bright); transform: translateY(-1px); }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-next.gold { background: var(--gold); color: var(--navy); }
    .btn-next.gold:hover { filter: brightness(1.08); background: var(--gold); }

    /* ── THANK YOU ── */
    .thankyou-card {
      text-align: center;
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .thankyou-icon {
      width: 80px; height: 80px;
      background: rgba(201,168,76,0.12);
      border: 2px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      color: var(--gold);
      margin: 0 auto 2rem;
    }
    .thankyou-card h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.75rem; }
    .thankyou-card p { color: rgba(255,255,255,0.6); line-height: 1.7; max-width: 420px; margin: 0 auto 2rem; }
    .summary-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 2rem; }
    .chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
    }

    /* ── SENDING STATE ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── VALIDATION ── */
    .field-error {
      color: #ff6b6b;
      font-size: 0.8rem;
      margin-top: 6px;
      display: none;
    }
    .field-error.show { display: block; }

    @media (max-width: 600px) {
      .quiz-card { padding: 2rem 1.5rem; }
      .options-grid.cols-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="index.html">
      <img src="CT_Logo_2.jpg" alt="CT Holdings Logo" onerror="this.style.display='none'"/>
      <span>CT Holdings <small>& Investments</small></span>
    </a>
    <a href="index.html" class="nav-back"><i class="bi bi-arrow-left"></i> Back to site</a>
  </div>
</nav>

<div class="quiz-shell">
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-meta">
      <span class="step-label" id="stepLabel">Getting Started</span>
      <span class="step-count" id="stepCount">1 of 9</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:11%"></div>
    </div>
  </div>

  <div class="card-stage" id="cardStage">
    <!-- cards injected by JS -->
  </div>
</div>

<script>
const steps = [
  {
    id: 'full_name',
    icon: 'bi-person',
    label: 'Your Name',
    question: 'What\'s your name?',
    hint: 'We\'ll use this to personalise your quote.',
    type: 'text',
    placeholder: 'e.g. Sipho Dlamini',
    required: true,
  },
  {
    id: 'business_name',
    icon: 'bi-building',
    label: 'Business',
    question: 'What\'s your business called?',
    hint: 'Your registered company name or trading name.',
    type: 'text',
    placeholder: 'e.g. Dlamini Traders (Pty) Ltd',
    required: true,
  },
  {
    id: 'email',
    icon: 'bi-envelope',
    label: 'Contact',
    question: 'Best email to reach you?',
    hint: 'We\'ll send your quote here within one business day.',
    type: 'email',
    placeholder: 'you@example.com',
    required: true,
    validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? null : 'Please enter a valid email address.',
  },
  {
    id: 'phone',
    icon: 'bi-telephone',
    label: 'Phone',
    question: 'And your phone number?',
    hint: 'Optional but helpful if we need to clarify anything quickly.',
    type: 'tel',
    placeholder: '+27 81 234 5678',
    required: false,
  },
  {
    id: 'service',
    icon: 'bi-grid-1x2',
    label: 'Service',
    question: 'What do you need help with?',
    hint: 'Pick the one that best fits — we\'ll tailor from there.',
    type: 'options',
    cols: 2,
    options: [
      { value: 'Bookkeeping', label: 'Bookkeeping', icon: 'bi-journal-bookmark-fill' },
      { value: 'VAT Returns', label: 'VAT Returns', icon: 'bi-receipt-cutoff' },
      { value: 'Payroll & PAYE', label: 'Payroll & PAYE', icon: 'bi-people-fill' },
      { value: 'Tax Returns', label: 'Tax Returns', icon: 'bi-file-earmark-text-fill' },
      { value: 'Multiple Services', label: 'Multiple Services', icon: 'bi-layers-fill' },
      { value: 'Not Sure', label: 'Not sure yet', icon: 'bi-question-circle-fill' },
    ],
    required: true,
  },
  {
    id: 'monthly_transactions',
    icon: 'bi-activity',
    label: 'Volume',
    question: 'How busy is your business monthly?',
    hint: 'Rough estimate of invoices, payments and bank transactions combined.',
    type: 'options',
    cols: 2,
    options: [
      { value: 'Under 10', label: 'Under 10 transactions', icon: 'bi-dash-circle' },
      { value: '10–59', label: '10 – 59 transactions', icon: 'bi-circle-half' },
      { value: '60–150', label: '60 – 150 transactions', icon: 'bi-circle-fill' },
      { value: '150+', label: '150+ transactions', icon: 'bi-record-circle-fill' },
    ],
    required: true,
  },
  {
    id: 'vat_registered',
    icon: 'bi-shield-check',
    label: 'VAT Status',
    question: 'Is your business VAT registered?',
    hint: 'This affects which package applies.',
    type: 'options',
    cols: 1,
    options: [
      { value: 'Yes', label: 'Yes, we\'re VAT registered', icon: 'bi-check-circle-fill' },
      { value: 'No', label: 'No, not VAT registered', icon: 'bi-x-circle-fill' },
      { value: 'Not sure', label: 'I\'m not sure', icon: 'bi-question-circle-fill' },
    ],
    required: true,
  },
  {
    id: 'employees',
    icon: 'bi-people',
    label: 'Team Size',
    question: 'How many employees do you have?',
    hint: 'Including yourself if you pay yourself a salary.',
    type: 'options',
    cols: 2,
    options: [
      { value: '0 (Sole trader)', label: 'Just me', icon: 'bi-person-fill' },
      { value: '1–5', label: '1 – 5 employees', icon: 'bi-people' },
      { value: '6–20', label: '6 – 20 employees', icon: 'bi-people-fill' },
      { value: '20+', label: '20+ employees', icon: 'bi-person-workspace' },
    ],
    required: true,
  },
  {
    id: 'message',
    icon: 'bi-chat-left-text',
    label: 'Anything else',
    question: 'Anything else we should know?',
    hint: 'Current challenges, backlog, specific deadlines — all helpful but totally optional.',
    type: 'textarea',
    placeholder: 'e.g. We\'ve been doing our own books but got behind. Need to sort out 6 months backlog...',
    required: false,
  },
];

let current = 0;
const answers = {};
let sending = false;

const stage = document.getElementById('cardStage');
const progressFill = document.getElementById('progressFill');
const stepLabel = document.getElementById('stepLabel');
const stepCount = document.getElementById('stepCount');
const progressWrap = document.getElementById('progressWrap');

function updateProgress(idx) {
  const pct = Math.round(((idx) / steps.length) * 100);
  progressFill.style.width = Math.max(6, pct) + '%';
  stepLabel.textContent = steps[idx] ? steps[idx].label : 'Done';
  stepCount.textContent = `${idx + 1} of ${steps.length}`;
}

function getCurrentValue(step) {
  if (step.type === 'options') {
    const sel = stage.querySelector('.opt-btn.selected');
    return sel ? sel.dataset.value : '';
  }
  const inp = stage.querySelector('.quiz-input');
  return inp ? inp.value.trim() : '';
}

function validateCurrent(step) {
  const val = getCurrentValue(step);
  if (step.required && !val) return 'This field is required.';
  if (val && step.validate) return step.validate(val);
  return null;
}

function renderCard(idx, direction = 1) {
  if (idx >= steps.length) { renderDone(); return; }
  const step = steps[idx];
  updateProgress(idx);

  const card = document.createElement('div');
  card.className = 'quiz-card';

  let inputHTML = '';
  if (step.type === 'options') {
    const optBtns = step.options.map(o =>
      `<button class="opt-btn${answers[step.id] === o.value ? ' selected' : ''}" data-value="${o.value}" type="button">
        <i class="bi ${o.icon} opt-icon"></i>${o.label}
      </button>`
    ).join('');
    inputHTML = `<div class="options-grid ${step.cols === 2 ? 'cols-2' : 'cols-1'}">${optBtns}</div>`;
  } else if (step.type === 'textarea') {
    inputHTML = `<textarea class="quiz-input" placeholder="${step.placeholder || ''}" rows="4">${answers[step.id] || ''}</textarea>`;
  } else {
    inputHTML = `<input class="quiz-input" type="${step.type}" placeholder="${step.placeholder || ''}" value="${answers[step.id] || ''}"/>`;
  }

  card.innerHTML = `
    <div class="card-icon"><i class="bi ${step.icon}"></i></div>
    <div class="card-question">${step.question}</div>
    <div class="card-hint">${step.hint}</div>
    ${inputHTML}
    <div class="field-error" id="fieldErr"></div>
    <div class="card-actions">
      <button class="btn-back" id="btnBack" type="button" ${idx === 0 ? 'style="visibility:hidden"' : ''}>
        <i class="bi bi-arrow-left"></i> Back
      </button>
      <button class="btn-next ${idx === steps.length - 1 ? 'gold' : ''}" id="btnNext" type="button">
        ${idx === steps.length - 1 ? '<i class="bi bi-send-fill"></i> Submit' : 'Next <i class="bi bi-arrow-right"></i>'}
      </button>
    </div>
  `;

  stage.innerHTML = '';
  stage.appendChild(card);

  // auto-focus text inputs
  if (step.type !== 'options') {
    setTimeout(() => card.querySelector('.quiz-input')?.focus(), 80);
  }

  // option click
  card.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      card.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      answers[step.id] = btn.dataset.value;
      // auto-advance
      setTimeout(() => advance(idx, step), 280);
    });
  });

  // next btn
  card.querySelector('#btnNext').addEventListener('click', () => advance(idx, step));

  // back btn
  card.querySelector('#btnBack').addEventListener('click', () => {
    if (idx > 0) { current--; renderCard(current, -1); }
  });

  // enter key for text
  card.querySelectorAll('.quiz-input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && step.type !== 'textarea') advance(idx, step);
    });
  });
}

function advance(idx, step) {
  const val = getCurrentValue(step);
  const err = validateCurrent(step);
  const errEl = stage.querySelector('#fieldErr');
  if (err) {
    errEl.textContent = err;
    errEl.classList.add('show');
    stage.querySelector('.quiz-input')?.classList.add('field-error-border');
    return;
  }
  if (errEl) { errEl.classList.remove('show'); }
  answers[step.id] = val;

  if (idx === steps.length - 1) {
    submitForm();
  } else {
    const card = stage.querySelector('.quiz-card');
    card.classList.add('card-exiting');
    setTimeout(() => { current = idx + 1; renderCard(current); }, 280);
  }
}

async function submitForm() {
  const nextBtn = stage.querySelector('#btnNext');
  nextBtn.disabled = true;
  nextBtn.innerHTML = '<span class="spinner"></span> Sending…';

  const payload = {
    access_key: 'b11df953-dde4-4fc8-82c3-4c4a483aceb9',
    subject: 'New Quote Request - CT Holdings and Investments',
    from_name: 'CT Holdings Website',
    full_name: answers.full_name || '',
    business_name: answers.business_name || '',
    email: answers.email || '',
    phone: answers.phone || '',
    service: answers.service || '',
    monthly_transactions: answers.monthly_transactions || '',
    vat_registered: answers.vat_registered || '',
    employees: answers.employees || '',
    message: answers.message || '',
  };

  try {
    const res = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (json.success) {
      renderDone();
    } else {
      throw new Error(json.message || 'Failed');
    }
  } catch (e) {
    nextBtn.disabled = false;
    nextBtn.innerHTML = '<i class="bi bi-send-fill"></i> Retry';
    const errEl = stage.querySelector('#fieldErr');
    if (errEl) { errEl.textContent = 'Something went wrong. Please try again or email csmokoena11@gmail.com'; errEl.classList.add('show'); }
  }
}

function renderDone() {
  progressWrap.style.opacity = '0';
  progressWrap.style.transition = 'opacity 0.3s';

  const chips = [
    answers.service,
    answers.monthly_transactions,
    answers.vat_registered ? `VAT: ${answers.vat_registered}` : null,
    answers.employees,
  ].filter(Boolean).map(v => `<span class="chip">${v}</span>`).join('');

  stage.innerHTML = `
    <div class="quiz-card thankyou-card">
      <div class="thankyou-icon"><i class="bi bi-check-lg"></i></div>
      <h2>You're all set, ${(answers.full_name || '').split(' ')[0]}!</h2>
      <p>We've received your details and will send a tailored quote to <strong>${answers.email}</strong> within one business day.</p>
      <div class="summary-chips">${chips}</div>
      <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--red);color:var(--white);text-decoration:none;padding:13px 28px;border-radius:8px;font-weight:600;font-size:0.9rem;transition:background 0.2s;" onmouseover="this.style.background='#c0392b'" onmouseout="this.style.background='var(--red)'">
        <i class="bi bi-house-fill"></i> Back to CT Holdings
      </a>
    </div>
  `;
}

// init
renderCard(0);
